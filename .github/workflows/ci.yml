name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: ['8.3', '8.4']
        laravel: ['11.*', '12.*', '13.*']
        include:
          - laravel: '11.*'
            testbench: '9.*'
            pest: '^3.0'
            pest_plugin: '^3.0'
          - laravel: '12.*'
            testbench: '10.*'
            pest: '^3.0'
            pest_plugin: '^3.0'
          - laravel: '13.*'
            testbench: '11.*'
            pest: '^4.0'
            pest_plugin: '^4.0'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, openssl
          coverage: none

      - name: Install dependencies
        run: |
          composer config policy.advisories.block false
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "pestphp/pest:${{ matrix.pest }}" "pestphp/pest-plugin-laravel:${{ matrix.pest_plugin }}" --no-interaction --no-update --dev
          composer update --prefer-stable --no-interaction

      - name: Run tests
        run: vendor/bin/pest

  quality:
    runs-on: ubuntu-latest
    name: Static analysis & code style

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction

      - name: Run Pint
        run: vendor/bin/pint --test

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse
